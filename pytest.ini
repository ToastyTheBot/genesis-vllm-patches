[pytest]
# Audit P1 documentation 2026-05-05 (genesis_local_consistency_audit_2026-05-05.md):
# Genesis lives at `vllm/_genesis/` inside the upstream `vllm` namespace
# package (which has NO `__init__.py`). pytest 9 + Python's namespace-package
# import mode does NOT pick up sys.path mutations from `pythonpath = .`,
# `--override-ini`, root-level `conftest.py`, or `--import-mode={prepend,importlib}`
# fast enough — by the time `vllm/_genesis/tests/conftest.py` is imported as
# `vllm._genesis.tests.conftest`, the namespace `vllm` resolution already
# failed.
#
# WORKAROUND (until pytest 10 or fixture-package refactor):
#     PYTHONPATH=. pytest vllm/_genesis/tests/...
# OR run via:
#     python3 -m pytest vllm/_genesis/tests/...
# Both bypass pytest's import-discovery quirk and put repo root on sys.path
# at interpreter-launch time.
#
# The `pythonpath = .` line below is kept defensively in case future pytest
# fixes the resolution order; today it is a hint, not a fix.
pythonpath = .

# Conventional discovery (test_*.py + Test* classes + test_* methods)
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Helpful: shorter traceback by default (full --tb=long via CLI)
addopts =
    -ra
    --tb=short
    --strict-markers

# Common Genesis markers
markers =
    gpu: requires CUDA-capable GPU
    integration: end-to-end with live container
    slow: takes > 30 seconds
